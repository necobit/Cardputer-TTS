[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    m5stack/M5Cardputer@^1.1.1
    https://github.com/necobit/ESP32FormantTTS.git
